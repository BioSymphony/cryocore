<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="stage-state-machine"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1040" height="420" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Stage state machine</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">A stage advances when the evidence required at each transition is on disk.</text><g transform="translate(40 150)"><rect width="200" height="86" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">pending</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">brief drafted,</text><text x="14" y="65" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">inputs declared</text></g><g transform="translate(290 150)"><rect width="200" height="86" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">prep mode</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">contracts validated,</text><text x="14" y="65" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">launch request ready</text></g><g transform="translate(540 150)"><rect width="200" height="86" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">real mode</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">running, artifacts</text><text x="14" y="65" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">in progress</text></g><g transform="translate(790 150)"><rect width="200" height="86" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">closed</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">artifacts hashed,</text><text x="14" y="65" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">closeout complete</text></g><line x1="242" y1="193.0" x2="288" y2="193.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><text x="265.0" y="134" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">contracts pass</text><line x1="492" y1="193.0" x2="538" y2="193.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><text x="515.0" y="134" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">operator gate open</text><line x1="742" y1="193.0" x2="788" y2="193.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><text x="765.0" y="134" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">closeout package complete</text><text x="140.0" y="258" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">brief, manifest,</text><text x="140.0" y="274" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">resource mode</text><text x="390.0" y="258" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">launch request,</text><text x="390.0" y="274" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">stage contract</text><text x="640.0" y="258" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">progress ledger,</text><text x="640.0" y="274" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">artifact hashes</text><text x="890.0" y="258" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">claim ledger,</text><text x="890.0" y="274" font-size="11.5" fill="#8a8a8a" font-weight="400" text-anchor="middle" font-style="italic">final outcome</text><g transform="translate(40 300)"><rect width="960" height="86" rx="4" fill="none" stroke="#8a8a8a" stroke-width="1.3" stroke-dasharray="5 4"/><text x="14" y="22" font-size="13" fill="#141414" font-weight="700" text-anchor="start">Side outcomes from any state</text></g><text x="56" y="346" font-size="11.5" fill="#555555" font-weight="400" text-anchor="start">blocked — operator gate, license, or contract missing</text><text x="56" y="366" font-size="11.5" fill="#555555" font-weight="400" text-anchor="start">failed — irrecoverable error or refused validation</text><text x="540" y="346" font-size="11.5" fill="#555555" font-weight="400" text-anchor="start">partial — some artifacts on disk, others unhashed</text><text x="540" y="366" font-size="11.5" fill="#555555" font-weight="400" text-anchor="start">degraded — ran with reduced inputs; claim downgraded</text></svg>
