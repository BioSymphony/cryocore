<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-label="CryoCore and Structure Factory ownership boundary">
  <rect width="1100" height="500" fill="#ffffff"/>
  <text x="44" y="54" font-family="Arial" font-size="30" font-weight="700" fill="#13212e">CryoCore and Structure Factory</text>
  <text x="44" y="84" font-family="Arial" font-size="16" fill="#46515c">Two focused repos, separate runtimes, and a small shared posture layer.</text>

  <g transform="translate(44 126)">
    <rect width="420" height="316" rx="10" fill="#eef2fb" stroke="#344e85" stroke-width="1.6"/>
    <text x="24" y="38" font-family="Arial" font-size="21" font-weight="700" fill="#24365e">CryoCore</text>
    <text x="24" y="66" font-family="Arial" font-size="15" fill="#46515c">experimental cryo-EM evidence</text>

    <text x="24" y="112" font-family="Arial" font-size="16" font-weight="700" fill="#1c2a45">Owns</text>
    <text x="24" y="142" font-family="Arial" font-size="15" fill="#20303d">- public-accession and operator-input review</text>
    <text x="24" y="170" font-family="Arial" font-size="15" fill="#20303d">- raw-to-map, map-to-model, density lanes</text>
    <text x="24" y="198" font-family="Arial" font-size="15" fill="#20303d">- figures, state review, artifact checks</text>

    <text x="24" y="246" font-family="Arial" font-size="16" font-weight="700" fill="#1c2a45">Tool posture examples</text>
    <text x="24" y="276" font-family="Arial" font-size="15" fill="#20303d">RELION, CryoSPARC, MotionCor, Coot,</text>
    <text x="24" y="302" font-family="Arial" font-size="15" fill="#20303d">Phenix, ModelAngelo, wwPDB validation</text>
  </g>

  <g transform="translate(494 184)">
    <rect width="112" height="184" rx="10" fill="#fff5dc" stroke="#806128" stroke-width="1.6"/>
    <text x="56" y="36" font-family="Arial" font-size="15" font-weight="700" fill="#5a4215" text-anchor="middle">Shared</text>
    <text x="56" y="58" font-family="Arial" font-size="15" font-weight="700" fill="#5a4215" text-anchor="middle">posture</text>
    <text x="56" y="80" font-family="Arial" font-size="15" font-weight="700" fill="#5a4215" text-anchor="middle">records</text>
    <text x="56" y="120" font-family="Arial" font-size="13" fill="#3a2e15" text-anchor="middle">ChimeraX</text>
    <text x="56" y="142" font-family="Arial" font-size="13" fill="#3a2e15" text-anchor="middle">renderers</text>
    <text x="56" y="164" font-family="Arial" font-size="13" fill="#3a2e15" text-anchor="middle">audit dates</text>
  </g>

  <g transform="translate(636 126)">
    <rect width="420" height="316" rx="10" fill="#f3ecfa" stroke="#68458e" stroke-width="1.6"/>
    <text x="24" y="38" font-family="Arial" font-size="21" font-weight="700" fill="#4b2f68">Structure Factory</text>
    <text x="24" y="66" font-family="Arial" font-size="15" fill="#46515c">design, prediction, screening</text>

    <text x="24" y="112" font-family="Arial" font-size="16" font-weight="700" fill="#3a2350">Owns</text>
    <text x="24" y="142" font-family="Arial" font-size="15" fill="#20303d">- prediction and design runtimes</text>
    <text x="24" y="170" font-family="Arial" font-size="15" fill="#20303d">- screening, scoring, campaign synthesis</text>
    <text x="24" y="198" font-family="Arial" font-size="15" fill="#20303d">- atlas reports and design-candidate review</text>

    <text x="24" y="246" font-family="Arial" font-size="16" font-weight="700" fill="#3a2350">Tool posture examples</text>
    <text x="24" y="276" font-family="Arial" font-size="15" fill="#20303d">AlphaFold, RFdiffusion, Boltz, Chai,</text>
    <text x="24" y="302" font-family="Arial" font-size="15" fill="#20303d">ProteinMPNN, screening stacks</text>
  </g>

  <g stroke="#806128" stroke-width="1.8" fill="none">
    <line x1="464" y1="276" x2="494" y2="276"/>
    <line x1="606" y1="276" x2="636" y2="276"/>
  </g>

  <text x="550" y="462" font-family="Arial" font-size="15" fill="#46515c" text-anchor="middle">Shared does not mean merged: each repo keeps its own runtime and license gates.</text>
</svg>
