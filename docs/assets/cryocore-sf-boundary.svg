<svg xmlns="http://www.w3.org/2000/svg" width="1010" height="408" viewBox="0 0 1010 408" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="cryocore-sf-boundary"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1010" height="408" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">CryoCore and Structure Factory</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">Two focused repos, separate runtimes, and a small shared posture layer.</text><g transform="translate(24 100)"><rect width="396" height="230" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="17" fill="#141414" font-weight="700" text-anchor="start">CryoCore</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">experimental cryo-EM evidence</text><text x="14" y="68" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="86" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Owns</text><text x="14" y="104" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- public-accession + operator-input review</text><text x="14" y="122" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- raw-to-map, map-to-model, density lanes</text><text x="14" y="140" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- figures, state review, artifact checks</text><text x="14" y="158" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="176" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Tools: RELION, CryoSPARC, MotionCor, Coot,</text><text x="14" y="194" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Phenix, ModelAngelo, PyMOL, wwPDB validation</text></g><g transform="translate(445 150)"><rect width="120" height="130" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="12" y="26" font-size="14" fill="#141414" font-weight="700" text-anchor="start">Shared</text><text x="12" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">ChimeraX</text><text x="12" y="65" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">renderers</text><text x="12" y="82" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">audit dates</text></g><g transform="translate(590 100)"><rect width="396" height="230" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="17" fill="#141414" font-weight="700" text-anchor="start">Structure Factory</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">design, prediction, screening</text><text x="14" y="68" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="86" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Owns</text><text x="14" y="104" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- prediction and design runtimes</text><text x="14" y="122" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- screening, scoring, campaign synthesis</text><text x="14" y="140" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- atlas reports and design-candidate review</text><text x="14" y="158" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="176" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Tools: AlphaFold, RFdiffusion, Boltz, Chai,</text><text x="14" y="194" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">ProteinMPNN, screening stacks</text></g><line x1="420" y1="215" x2="445" y2="215" stroke="#1b1b1b" stroke-width="1.4"/><line x1="565" y1="215" x2="590" y2="215" stroke="#1b1b1b" stroke-width="1.4"/><line x1="36" y1="360" x2="974" y2="360" stroke="#e2e2e2"/><text x="36" y="384" font-size="12" fill="#8a8a8a" font-weight="400" text-anchor="start">Shared does not mean merged: each repo keeps its own runtime and license gates.</text></svg>
