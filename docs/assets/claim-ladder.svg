<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="454" viewBox="0 0 1040 454" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="claim-ladder"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1040" height="454" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Claim ladder</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">Four climbing rungs and two side outcomes. The schema is the authority.</text><g transform="translate(24 368)"><rect width="520" height="70" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="24" font-size="15" fill="#141414" font-weight="700" text-anchor="start">candidate</text><text x="14" y="46" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">plausible observation or hypothesis;</text><text x="14" y="62" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">metadata, geometry, or planning only</text></g><g transform="translate(24 280)"><rect width="520" height="70" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="24" font-size="15" fill="#141414" font-weight="700" text-anchor="start">processed</text><text x="14" y="46" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">real artifacts from declared inputs;</text><text x="14" y="62" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">passed structural checks</text></g><g transform="translate(24 192)"><rect width="520" height="70" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="24" font-size="15" fill="#141414" font-weight="700" text-anchor="start">validated</text><text x="14" y="46" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">artifacts joined to inputs, tool versions,</text><text x="14" y="62" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">hashes, validation outputs, caveats</text></g><g transform="translate(24 104)"><rect width="520" height="70" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="24" font-size="15" fill="#141414" font-weight="700" text-anchor="start">publishable</text><text x="14" y="46" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">dossier complete enough for expert</text><text x="14" y="62" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">review and possible publication support</text></g><line x1="284.0" y1="368" x2="284.0" y2="354" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="284.0" y1="280" x2="284.0" y2="266" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="284.0" y1="192" x2="284.0" y2="178" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><g transform="translate(580 104)"><rect width="436" height="150" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">Climb when</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">the next layer of evidence is on disk</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">and joined to the declared inputs</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="102" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Downgrade when</text><text x="14" y="120" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">artifacts missing or unhashed; validation</text><text x="14" y="138" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">incomplete; license unresolved; mock used</text></g><g transform="translate(580 270)"><rect width="436" height="130" rx="4" fill="none" stroke="#8a8a8a" stroke-width="1.3" stroke-dasharray="5 4"/><text x="14" y="24" font-size="14" fill="#141414" font-weight="700" text-anchor="start">Side outcomes (off the ladder)</text><text x="14" y="46" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">insufficient_evidence — the run does not</text><text x="14" y="64" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">support the proposed claim; a boundary</text><text x="14" y="82" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="100" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">blocked — a required input, license,</text><text x="14" y="118" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">or gate is missing</text></g></svg>
