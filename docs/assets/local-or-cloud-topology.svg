    <text x="14" y="76" font-family="Arial" font-size="12" fill="#20303d">bridge manifests</text>
    <text x="14" y="92" font-family="Arial" font-size="12" fill="#20303d">stage contracts</text>
  </g>

  <g transform="translate(392 268)">
