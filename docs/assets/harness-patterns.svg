<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="460" viewBox="0 0 1040 460" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="harness-patterns"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1040" height="460" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Harness compatibility</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">Several agent harnesses, one CryoCore skill pack underneath.</text><g transform="translate(24 100)"><rect width="230" height="126" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="15" fill="#141414" font-weight="700" text-anchor="start">Symphony</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Codex workers, Linear issues</text><text x="14" y="68" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">parallel autonomous fanout</text><text x="14" y="86" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">long-horizon campaigns</text></g><g transform="translate(278 100)"><rect width="230" height="126" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="15" fill="#141414" font-weight="700" text-anchor="start">Linear + Claude</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">tracker-driven wave</text><text x="14" y="68" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Claude API or Claude Code</text><text x="14" y="86" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">issue-shaped contracts</text></g><g transform="translate(532 100)"><rect width="230" height="126" rx="4" fill="#ffffff" strok