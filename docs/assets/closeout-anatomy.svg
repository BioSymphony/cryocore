<svg xmlns="http://www.w3.org/2000/svg" width="1010" height="440" viewBox="0 0 1010 440" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="closeout-anatomy"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1010" height="440" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Provider run review</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">A run is trustworthy when all six pieces sit on disk and join back to the declared inputs.</text><g transform="translate(24 96)"><rect width="962" height="320" rx="4" fill="none" stroke="#8a8a8a" stroke-width="1.3" stroke-dasharray="5 4"/><text x="14" y="26" font-size="14" fill="#141414" font-weight="700" text-anchor="start">provider evidence package</text></g><g transform="translate(48 140)"><rect width="290" height="118" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="14" fill="#141414" font-weight="700" text-anchor="start">1. Fetched artifacts</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">declared maps, models,</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">figures, intermediate files</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">pulled from the provider</text></g><g transform="translate(372 140)"><rect width="290" height="118" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="14" fill="#141414" font-weight="700" text-anchor="start">2. Artifact hashes</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">SHA-256 per file,</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">recorded against declared</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">inputs in the pull report</text></g><g transform="translate(696 140)"><rect width="290" height="118" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="14" fill="#141414" font-weight="700" text-anchor="start">3. Validation outputs</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">schemas, contract self-check,</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">map-to-model fit,</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">wwPDB rollup if released</text></g><g transform="translate(48 278)"><rect width="290" height="118" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="14" fill="#141414" font-weight="700" text-anchor="start">4. Cost records</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">provider billing summary,</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">GPU hours, storage egress,</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">budget reconciliation</text></g><g transform="translate(372 278)"><rect width="290" height="118" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="14" fill="#141414" font-weight="700" text-anchor="start">5. Cleanup proof</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">pod terminated,</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">volumes released or retained,</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">orphan checks pass</text></g><g transform="translate(696 278)"><rect width="290" height="118" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="14" fill="#141414" font-weight="700" text-anchor="start">6. Claim boundaries</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">ceiling set against the</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">evidence on disk, with</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">caveats + final outcome</text></g></svg>
