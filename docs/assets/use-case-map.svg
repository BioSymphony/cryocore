<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="400" viewBox="0 0 1040 400" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="use-case-map"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1040" height="400" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Public use cases</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">Five useful ways to point an agent at CryoCore without exposing private data.</text><g transform="translate(24 104)"><rect width="308" height="110" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="15" fill="#141414" font-weight="700" text-anchor="start">Public Accession Review</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">EMDB/PDB metadata, figures,</text><text x="14" y="69" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">density support, caveats.</text></g><g transform="translate(390 104)"><rect width="308" height="110" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="15" fill="#141414" font-weight="700" text-anchor="start">Provider Run Review</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Reject intent-only success; require</text><text x="14" y="69" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">hashes, cost, cleanup, artifacts.</text></g><g transform="translate(756 104)"><rect width="308" height="110" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="15" fill="#141414" font-weight="700" text-anchor="start">Public Release Safety</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Scan secrets, private markers,</text><text x="14" y="69" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">heavy artifacts, license posture.</text></g><g transform="translate(207 250)"><rect width="308" height="110" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="15" fill="#141414" font-weight="700" text-anchor="start">Toolwatch + License Posture</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Sort tools into open, watch,</text><text x="14" y="69" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">or runtime-gated lanes.</text></g><g transform="translate(573 250)"><rect width="308" height="110" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="15" fill="#141414" font-weight="700" text-anchor="start">Figure + Structural Review</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Renderer plan, figure manifest,</text><text x="14" y="69" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">methods, provenance, caveats.</text></g></svg>
