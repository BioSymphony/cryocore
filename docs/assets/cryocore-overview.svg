    <text x="24" y="68" font-family="Arial" font-size="14" fill="#20303d">Point your coding agent at the repo, ask what the density supports, and require local checks before claims.</text>
    <text x="24" y="96" font-family="Arial" font-size="13" fill="#46515c">No raw movies, private structures, model weights, credentials, license files, or provider logs belong in git.</text>
