    <text x="20" y="110" font-family="Arial" font-size="13" fill="#20303d">Budget + cleanup</text>
  </g>

  <g transform="translate(752 98)">
    <rect width="190" height="132" rx="8" fill="#f3ecfa" stroke="#68458e" stroke-width="1.2"/>
