<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="cryocore-overview"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1000" height="320" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">BioSymphony CryoCore</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">Inputs become contracts, pass gates, and end as bounded review outputs.</text><g transform="translate(24 104)"><rect width="196" height="132" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="34" font-size="16" fill="#141414" font-weight="700" text-anchor="start">Inputs</text><text x="14" y="56" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Public accessions</text><text x="14" y="76" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Operator datasets</text><text x="14" y="96" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Declared boundaries</text></g><g transform="translate(276 104)"><rect width="196" height="132" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="34" font-size="16" fill="#141414" font-weight="700" text-anchor="start">Contracts</text><text x="14" y="56" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Schemas</text><text x="14" y="76" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Stage ledgers</text><text x="14" y="96" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Provider profiles</text></g><g transform="translate(528 104)"><rect width="196" height="132" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="3