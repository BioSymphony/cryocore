<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="350" viewBox="0 0 1180 350" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="mission-arc"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1180" height="350" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Mission arc</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">One mission from broad goal to useful structural output. You set goals; the agent carries the work.</text><g transform="translate(24 104)"><rect width="208" height="150" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">1. User goal</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">one sentence in</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">plain English</text></g><text x="38" y="240" font-size="11" fill="#8a8a8a" font-weight="400" text-anchor="start" font-style="italic">human</text><g transform="translate(255 104)"><rect width="208" height="150" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">2. Goal brief</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">fills template,</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">picks resource mode,</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">names first artifact</text></g><text x="269" y="240" font-size="11" fill="#8a8a8a" font-weight="400" text-anchor="start" font-style="italic">agent · human review</text><g transform="translate(486 104)"><rect width="208" height="150" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">3. Wave plan</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Linear-style issues,</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">DAG of dependencies,</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">operator gates</text></g><text x="500" y="240" font-size="11" fill="#8a8a8a" font-weight="400" text-anchor="start" font-style="italic">agent · human approve</text><g transform="translate(717 104)"><rect width="208" height="150" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">4. Execution</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">workers run stages,</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">fetch + hash artifacts,</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">validate</text></g><text x="731" y="240" font-size="11" fill="#8a8a8a" font-weight="400" text-anchor="start" font-style="italic">agents</text><g transform="translate(948 104)"><rect width="208" height="150" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="26" font-size="15" fill="#141414" font-weight="700" text-anchor="start">5. Review output</text><text x="14" y="48" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">human reads report,</text><text x="14" y="66" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">figures, caveats,</text><text x="14" y="84" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">summary, manifest</text></g><text x="962" y="240" font-size="11" fill="#8a8a8a" font-weight="400" text-anchor="start" font-style="italic">human</text><line x1="234" y1="179.0" x2="253" y2="179.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="465" y1="179.0" x2="484" y2="179.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="696" y1="179.0" x2="715" y2="179.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="927" y1="179.0" x2="946" y2="179.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><g transform="translate(24 276)"><rect width="1132" height="46" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/></g><text x="36" y="304" font-size="13" fill="#555555" font-weight="400" text-anchor="start">Human touches:  goal sentence  →  review brief  →  approve wave  →  open paid / license gates if needed  →  review output</text></svg>
