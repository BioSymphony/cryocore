<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="CryoCore mission arc">
  <rect width="1200" height="380" fill="#ffffff"/>
  <text x="44" y="54" font-family="Arial" font-size="30" font-weight="700" fill="#13212e">Mission Arc</text>
  <text x="44" y="84" font-family="Arial" font-size="15" fill="#46515c">One mission from broad goal to useful structural output. The user sets goals and reviews; the agent carries the work.</text>

  <g transform="translate(44 134)">
    <rect width="200" height="116" rx="8" fill="#e8f4f1" stroke="#1f5f55" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="15" font-weight="700" fill="#163b35">1. User goal</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">one sentence in plain</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">English</text>
    <text x="16" y="98" font-family="Arial" font-size="11" fill="#46515c">human</text>
  </g>

  <g transform="translate(264 134)">
    <rect width="200" height="116" rx="8" fill="#eef2fb" stroke="#344e85" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="15" font-weight="700" fill="#24365e">2. Goal brief</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">agent fills template,</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">picks resource mode,</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">names first artifact</text>
    <text x="16" y="110" font-family="Arial" font-size="11" fill="#46515c">agent · human review</text>
  </g>

  <g transform="translate(484 134)">
    <rect width="200" height="116" rx="8" fill="#fff5dc" stroke="#806128" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="15" font-weight="700" fill="#5a4215">3. Wave plan</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">Linear-style issues,</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">DAG of dependencies,</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">operator gates</text>
    <text x="16" y="110" font-family="Arial" font-size="11" fill="#46515c">agent · human approve</text>
  </g>

  <g transform="translate(704 134)">
    <rect width="200" height="116" rx="8" fill="#f3ecfa" stroke="#68458e" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="15" font-weight="700" fill="#4b2f68">4. Execution</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">workers run stages,</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">fetch and hash</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">artifacts, validate</text>
    <text x="16" y="110" font-family="Arial" font-size="11" fill="#46515c">agents</text>
  </g>

  <g transform="translate(924 134)">
    <rect width="232" height="116" rx="8" fill="#f0e7f5" stroke="#5a3a72" stroke-width="1.4"/>
    <text x="16" y="30" font-family="Arial" font-size="15" font-weight="700" fill="#3a2350">5. Review output</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">human reads report,</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">figures, caveats, checks</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">summary, manifest</text>
    <text x="16" y="110" font-family="Arial" font-size="11" fill="#46515c">human</text>
  </g>

  <g stroke="#344" stroke-width="2" fill="none">
    <line x1="244" y1="192" x2="259" y2="192"/>
    <path d="M252 185 L264 192 L252 199"/>
    <line x1="464" y1="192" x2="479" y2="192"/>
    <path d="M472 185 L484 192 L472 199"/>
    <line x1="684" y1="192" x2="699" y2="192"/>
    <path d="M692 185 L704 192 L692 199"/>
    <line x1="904" y1="192" x2="919" y2="192"/>
    <path d="M912 185 L924 192 L912 199"/>
  </g>

  <g transform="translate(44 282)">
    <rect width="1112" height="64" rx="8" fill="#f7f7f4" stroke="#3a3a32" stroke-width="1.2"/>
    <text x="20" y="28" font-family="Arial" font-size="13" font-weight="700" fill="#2a2a22">Human touches across the whole arc</text>
    <text x="20" y="52" font-family="Arial" font-size="12" fill="#3a3a32">goal sentence → review brief → approve wave → open paid or license gates if needed → review output</text>
  </g>
</svg>
