<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="480" viewBox="0 0 1040 480" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="skill-pack-map"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1040" height="480" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Skill pack map</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">One entry skill (cryocore) routes to six specialized skills, plus an extension slot.</text><g transform="translate(360.0 90)"><rect width="320" height="54" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="24" font-size="15" fill="#141414" font-weight="700" text-anchor="start">cryocore</text><text x="14" y="46" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">entry skill · routes to every skill below</text></g><g transform="translate(24 200)"><rect width="230" height="104" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="24" font-size="14" fill="#141414" font-weight="700" text-anchor="start">map-model-dossier</text><text x="14" y="46" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">EMDB + PDB pairs</text><text x="14" y="64" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">map header, model inventory</text><text x="14" y="82" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">density support, validation</text></g><g transform="translate(278 200)"><rect width="230" height="104" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="24" font-size="14" fill="#141414" font-weight="700" text-anchor="start">figure-dossier</text><text x="14" y="46" font-size="12.5" fill="#555555" font-weight="40