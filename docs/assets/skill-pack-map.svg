<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-label="CryoCore skill pack map">
  <rect width="1100" height="600" fill="#ffffff"/>
  <text x="44" y="54" font-family="Arial" font-size="30" font-weight="700" fill="#13212e">Skill Pack Map</text>
  <text x="44" y="84" font-family="Arial" font-size="15" fill="#46515c">Seven skills and the work each one fires on.</text>

  <g transform="translate(388 124)">
    <rect width="324" height="98" rx="10" fill="#e8eef5" stroke="#2d3b58" stroke-width="1.6"/>
    <text x="20" y="32" font-family="Arial" font-size="17" font-weight="700" fill="#1c2a45">cryocore</text>
    <text x="20" y="58" font-family="Arial" font-size="12" fill="#20303d">entry skill, fires on any CryoCore mission</text>
    <text x="20" y="78" font-family="Arial" font-size="12" fill="#20303d">routes to the specialized skills below</text>
  </g>

  <g stroke="#344" stroke-width="1.4" fill="none">
    <line x1="550" y1="222" x2="550" y2="244"/>
    <line x1="180" y1="244" x2="920" y2="244"/>
    <line x1="180" y1="244" x2="180" y2="278"/>
    <line x1="426" y1="244" x2="426" y2="278"/>
    <line x1="673" y1="244" x2="673" y2="278"/>
    <line x1="920" y1="244" x2="920" y2="278"/>
    <path d="M173 270 L180 285 L187 270"/>
    <path d="M419 270 L426 285 L433 270"/>
    <path d="M666 270 L673 285 L680 270"/>
    <path d="M913 270 L920 285 L927 270"/>
  </g>

  <g transform="translate(72 292)">
    <rect width="216" height="118" rx="8" fill="#eef2fb" stroke="#344e85" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="14" font-weight="700" fill="#24365e">map-model-dossier</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">EMDB + PDB pairs</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">map header summary,</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">model inventory, density</text>
    <text x="16" y="108" font-family="Arial" font-size="12" fill="#20303d">support, validation</text>
  </g>

  <g transform="translate(318 292)">
    <rect width="216" height="118" rx="8" fill="#f3ecfa" stroke="#68458e" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="14" font-weight="700" fill="#4b2f68">figure-dossier</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">renderer manifests</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">figure planning,</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">captions, software</text>
    <text x="16" y="108" font-family="Arial" font-size="12" fill="#20303d">versions, contour levels</text>
  </g>

  <g transform="translate(565 292)">
    <rect width="216" height="118" rx="8" fill="#fff5dc" stroke="#806128" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="14" font-weight="700" fill="#5a4215">heterogeneity-jury</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">multiple states or</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">conformations, 3D</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">classification, ensembles,</text>
    <text x="16" y="108" font-family="Arial" font-size="12" fill="#20303d">disagreement matrices</text>
  </g>

  <g transform="translate(812 292)">
    <rect width="216" height="118" rx="8" fill="#e8f4f1" stroke="#1f5f55" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="14" font-weight="700" fill="#163b35">public-safety</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">pre-public-release</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">checkout review,</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">secret scans, snapshot</text>
    <text x="16" y="108" font-family="Arial" font-size="12" fill="#20303d">scope checks</text>
  </g>

  <g transform="translate(195 432)">
    <rect width="216" height="118" rx="8" fill="#f5ece1" stroke="#7a5a2c" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="14" font-weight="700" fill="#503819">run-closeout</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">RunPod, AWS, HPC</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">closeout reviews,</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">artifact fetch, hashes,</text>
    <text x="16" y="108" font-family="Arial" font-size="12" fill="#20303d">cost and cleanup proof</text>
  </g>

  <g transform="translate(441 432)">
    <rect width="216" height="118" rx="8" fill="#ecf3ec" stroke="#3a6a3a" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="14" font-weight="700" fill="#1f4a1f">toolwatch</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#20303d">license posture audit,</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#20303d">software registry</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#20303d">freshness checks,</text>
    <text x="16" y="108" font-family="Arial" font-size="12" fill="#20303d">version drift</text>
  </g>

  <g transform="translate(688 432)">
    <rect width="216" height="118" rx="8" fill="#f7f7f4" stroke="#3a3a32" stroke-width="1.2"/>
    <text x="16" y="30" font-family="Arial" font-size="14" font-weight="700" fill="#2a2a22">add your own</text>
    <text x="16" y="56" font-family="Arial" font-size="12" fill="#46515c">drop a new SKILL.md</text>
    <text x="16" y="74" font-family="Arial" font-size="12" fill="#46515c">under skills/, add to</text>
    <text x="16" y="92" font-family="Arial" font-size="12" fill="#46515c">skills/index.yaml,</text>
    <text x="16" y="108" font-family="Arial" font-size="12" fill="#46515c">run make skill-check</text>
  </g>
