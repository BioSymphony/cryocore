<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="490" viewBox="0 0 1100 490" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="tool-lane-routing"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1100" height="490" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Tool lane routing</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">Every tool routes through one of three lanes based on its license posture.</text><g transform="translate(410.0 96)"><rect width="280" height="56" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="24" font-size="15" fill="#141414" font-weight="700" text-anchor="start">Tool entering</text><text x="14" y="46" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">from the software registry</text></g><g transform="translate(24 240)"><rect width="324" height="210" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="16" fill="#141414" font-weight="700" text-anchor="start">Open lane</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">permissive license, no install gate</text><text x="14" y="68" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="86" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Allowed</text><text x="14" y="104" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- public scaffolding</text><text x="14" y="122" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- image install in public lanes</text><text x="14" y="140" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- version + source URL recorded</text><text x="14" y="158" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="176" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">e.g. RELION, CTFFind, MotionCor3, Topaz</text></g><g transform="translate(388 240)"><rect width="324" height="210" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="16" fill="#141414" font-weight="700" text-anchor="start">Watch lane</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">license needs periodic audit</text><text x="14" y="68" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="86" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Required</text><text x="14" y="104" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- audit date recorded</text><text x="14" y="122" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- version pinned in registry</text><text x="14" y="140" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- usage scope confirmed</text><text x="14" y="158" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="176" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">e.g. CryoSPARC academic, CCP-EM, NVIDIA</text></g><g transform="translate(752 240)"><rect width="324" height="210" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="28" font-size="16" fill="#141414" font-weight="700" text-anchor="start">Runtime-gated lane</text><text x="14" y="50" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">install needs operator gate</text><text x="14" y="68" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="86" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Operator handles</text><text x="14" y="104" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- license acceptance outside git</text><text x="14" y="122" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- installer staging in runtime env</text><text x="14" y="140" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">- skill stays prep-only here</text><text x="14" y="158" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start"></text><text x="14" y="176" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">e.g. ChimeraX, Phenix, commercial CryoSPARC</text></g><line x1="550.0" y1="152" x2="550.0" y2="188" stroke="#1b1b1b" stroke-width="1.4"/><line x1="186.0" y1="188" x2="914.0" y2="188" stroke="#1b1b1b" stroke-width="1.4"/><line x1="186.0" y1="188" x2="186.0" y2="240" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="550.0" y1="188" x2="550.0" y2="240" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="914.0" y1="188" x2="914.0" y2="240" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/></svg>
