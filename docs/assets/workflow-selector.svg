<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="400" viewBox="0 0 1120 400" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="workflow-selector"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1120" height="400" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Choose the right CryoCore workflow</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">Start local, inspect evidence, gate cloud resources, then trust only joined artifacts and claims.</text><g transform="translate(24 104)"><rect width="200" height="200" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="32" font-size="17" fill="#141414" font-weight="700" text-anchor="start">Local</text><text x="14" y="54" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Demo</text><text x="14" y="76" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Validators</text><text x="14" y="98" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Public metadata</text></g><g transform="translate(38 264)"><rect width="172" height="24" rx="12.0" fill="none" stroke="#1b1b1b" stroke-width="1.2"/><text x="86.0" y="15.84" font-size="12" fill="#141414" font-weight="700" text-anchor="middle">safe default</text></g><g transform="translate(242 104)"><rect width="200" height="200" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="32" font-size="17" fill="#141414" font-weight="700" text-anchor="start">Agent</text><text x="14" y="54" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Skills</text><text x="14" y="76" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Prompts</text><text x="14" y="98" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Claim ceiling</text></g><g transform="translate(256 264)"><rect width="172" height="24" rx="12.0" fill="none" stroke="#1b1b1b" stroke-width="1.2"/><text x="86.0" y="15.84" font-size="12" fill="#141414" font-weight="700" text-anchor="middle">bounded task</text></g><g transform="translate(460 104)"><rect width="200" height="200" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="32" font-size="17" fill="#141414" font-weight="700" text-anchor="start">Review</text><text x="14" y="54" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Inputs</text><text x="14" y="76" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Figures</text><text x="14" y="98" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Provenance</text></g><g transform="translate(474 264)"><rect width="172" height="24" rx="12.0" fill="none" stroke="#1b1b1b" stroke-width="1.2"/><text x="86.0" y="15.84" font-size="12" fill="#141414" font-weight="700" text-anchor="middle">public output</text></g><g transform="translate(678 104)"><rect width="200" height="200" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="32" font-size="17" fill="#141414" font-weight="700" text-anchor="start">Cloud</text><text x="14" y="54" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">RunPod</text><text x="14" y="76" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">AWS / HPC</text><text x="14" y="98" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Operator gate</text></g><g transform="translate(692 264)"><rect width="172" height="24" rx="12.0" fill="none" stroke="#1b1b1b" stroke-width="1.2"/><text x="86.0" y="15.84" font-size="12" fill="#141414" font-weight="700" text-anchor="middle">not automatic</text></g><g transform="translate(896 104)"><rect width="200" height="200" rx="4" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="14" y="32" font-size="17" fill="#141414" font-weight="700" text-anchor="start">Trust</text><text x="14" y="54" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Artifacts</text><text x="14" y="76" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Hashes</text><text x="14" y="98" font-size="12.5" fill="#555555" font-weight="400" text-anchor="start">Claims</text></g><g transform="translate(910 264)"><rect width="172" height="24" rx="12.0" fill="none" stroke="#1b1b1b" stroke-width="1.2"/><text x="86.0" y="15.84" font-size="12" fill="#141414" font-weight="700" text-anchor="middle">proof</text></g><line x1="226" y1="204.0" x2="240" y2="204.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="444" y1="204.0" x2="458" y2="204.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="662" y1="204.0" x2="676" y2="204.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="880" y1="204.0" x2="894" y2="204.0" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><g transform="translate(24 326)"><rect width="1072" height="50" rx="4" fill="#1b1b1b" stroke="#1b1b1b" stroke-width="1.4"/></g><text x="560.0" y="356" font-size="12.5" fill="#ffffff" font-weight="400" text-anchor="middle">Rule: a job ID, pod state, or queue state is intent only. Success requires joined inputs, artifacts, checks, hashes, cleanup, and claim boundaries.</text></svg>
