<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="350" viewBox="0 0 1100 350" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="agent-loop"><defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8" fill="none" stroke="#1b1b1b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1100" height="350" fill="#ffffff"/><text x="36" y="44" font-size="24" fill="#141414" font-weight="700" text-anchor="start">Agent loop</text><text x="36" y="68" font-size="13" fill="#6b6b6b" font-weight="400" text-anchor="start">The repo tells an agent what to read, what to produce, what to avoid, and how to prove the result.</text><circle cx="110" cy="200" r="58" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="110" y="198" font-size="14" fill="#141414" font-weight="700" text-anchor="middle">Read</text><text x="110" y="216" font-size="10.5" fill="#555555" font-weight="400" text-anchor="middle">AGENTS + skill</text><circle cx="330" cy="200" r="58" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="330" y="198" font-size="14" fill="#141414" font-weight="700" text-anchor="middle">Plan</text><text x="330" y="216" font-size="10.5" fill="#555555" font-weight="400" text-anchor="middle">inputs + claims</text><circle cx="550" cy="200" r="58" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="550" y="198" font-size="14" fill="#141414" font-weight="700" text-anchor="middle">Run</text><text x="550" y="216" font-size="10.5" fill="#555555" font-weight="400" text-anchor="middle">local validators</text><circle cx="770" cy="200" r="58" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="770" y="198" font-size="14" fill="#141414" font-weight="700" text-anchor="middle">Report</text><text x="770" y="216" font-size="10.5" fill="#555555" font-weight="400" text-anchor="middle">artifacts + caveats</text><circle cx="990" cy="200" r="58" fill="#ffffff" stroke="#1b1b1b" stroke-width="1.4"/><text x="990" y="198" font-size="14" fill="#141414" font-weight="700" text-anchor="middle">Block</text><text x="990" y="216" font-size="10.5" fill="#555555" font-weight="400" text-anchor="middle">unsafe release</text><line x1="172" y1="200" x2="268" y2="200" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="392" y1="200" x2="488" y2="200" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="612" y1="200" x2="708" y2="200" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><line x1="832" y1="200" x2="928" y2="200" stroke="#1b1b1b" stroke-width="1.4" marker-end="url(#ar)"/><text x="36" y="300" font-size="12.5" fill="#8a8a8a" font-weight="400" text-anchor="start">Best first prompt: "Use the CryoCore skill pack. Stay local. Build a map/model review or figure</text><text x="36" y="318" font-size="12.5" fill="#8a8a8a" font-weight="400" text-anchor="start">workflow. Run the relevant validators and report exact artifacts."</text></svg>
