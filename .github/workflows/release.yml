name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Install gitleaks
        run: go install github.com/gitleaks/gitleaks/v8@v8.24.3
      - name: Run public release gate
        run: PATH="$HOME/go/bin:$PATH" REQUIRE_GITLEAKS=1 make release-check
      - name: Build release evidence bundle
        run: |
          mkdir -p release-artifacts
          python3 scripts/cryocore/public_release_report.py --repo-root . --out release-artifacts/public-release-report.json --json
          git archive --format=tar.gz --output release-artifacts/biosymphony-cryocore-public-${GITHUB_REF_NAME}.tar.gz HEAD
          (cd release-artifacts && shasum -a 256 * > SHA256SUMS)
      - uses: actions/upload-artifact@v4
        with:
          name: cryocore-public-release-evidence
          path: release-artifacts/
