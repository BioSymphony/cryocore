name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Install gitleaks
        run: go install github.com/gitleaks/gitleaks/v8@v8.24.3
      - name: Run public release gate
        run: PATH="$HOME/go/bin:$PATH" REQUIRE_GITLEAKS=1 make release-check
