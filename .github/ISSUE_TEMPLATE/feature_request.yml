name: Feature Request
description: Suggest a public-safe validator, schema, demo, or skill improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What public-safe workflow should become easier or stronger?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be added or changed?
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety boundaries
      options:
        - label: This can be implemented without committing private data, raw/heavy scientific files, credentials, provider logs, model weights, or license files.
          required: true
        - label: Any provider, raw data, or license-gated execution remains operator-gated outside the public repo.
          required: true
