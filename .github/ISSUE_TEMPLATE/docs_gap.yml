name: Documentation Gap
description: Report missing, confusing, or stale public docs.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: docs/public-quickstart.md
  - type: textarea
    id: gap
    attributes:
      label: Gap
      description: What should be clearer, safer, or easier?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed fix
      description: Optional wording, command, or example.
