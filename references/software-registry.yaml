# BioSymphony CryoCore software registry.
# Each entry must be checked from primary sources before status moves to ready.
# Human-readable posture: docs/tooling-and-licensing.md
# Last source-backed audit: 2026-05-15 for high-impact cryo-core lanes.

software:
  relion:
    role: cryoem_reconstruction
    image_family: cryo-core
    install_method: source_or_package_build
    upstream_repo: "https://github.com/3dem/relion"
    upstream_release_tag: "5.0.1"
    upstream_release_date: "2025-09-22"
    upstream_prerelease_tag: "5.1.0"
    upstream_prerelease_date: "2026-03-13"
    license_class: open_source_gplv2
    license_gate: none
    runpod_fit: strong
    gpu_class: "RTX 4090/L40S/A100"
    smoke_command: "relion_refine --version"
    runtime_artifacts: "versions.json, relion_toolcheck.json"
    citation_notes: "Record RELION version and cite RELION methods papers appropriate to version."
    status: planned
    notes: "Primary open-source SPA processing lane; preserve GPLv2 compliance and record compiler/CUDA support. GitHub marks 5.0.1 as Latest stable; 5.1.0 is available as a pre-release and should be reviewed before adoption."
  warp_m:
    role: cryoem_cryoet_processing
    image_family: cryo-core
    install_method: source_or_release_build
    upstream_repo: "https://github.com/warpem/warp"
    upstream_release_tag: "v2.0.0dev39"
    upstream_release_date: "2026-05-07"
    license_class: open_source_gplv3
    license_gate: none
    runpod_fit: strong
    gpu_class: "RTX 4090/L40S/A100"
    smoke_command: "WarpTools --help"
    runtime_artifacts: "warp_toolcheck.json, preprocessing_manifests/"
    citation_notes: "Record Warp/M/WarpTools versions and cite corresponding methods."
    status: planned
    notes: "Current v2 dev lane requires CUDA 12.9/.NET 10 and declares compatibility with RELION 5 only."
  motioncor3:
    role: motion_correction
    image_family: cryo-core
    install_method: source_build
    upstream_repo: "https://github.com/czimaginginstitute/MotionCor3"
    upstream_release_tag: "v1.0.1"
    upstream_release_date: "2023-10-26"
    license_class: open_source_bsd_3_clause
    license_gate: none
    runpod_fit: strong
    gpu_class: "RTX 4090/L40S/A100"
    smoke_command: "MotionCor3 --help"
    runtime_artifacts: "motioncorr_versions.json, corrected_micrograph_manifest.json"
    citation_notes: "Record MotionCor3 version and detector/movie metadata."
    status: planned
    notes: "Open-source MotionCor3 lane from CZI. Keep UCSF MotionCor2 binary as a separate runtime-gated tool."
  topaz:
    role: particle_picking
    image_family: cryo-core
    install_method: pip_or_source
    upstream_repo: "https://github.com/tbepler/topaz"
    pypi_package: "topaz-em==0.3.20"
    upstream_release_tag: "0.3.20"
    upstream_release_date: "2026-05-11"
    license_class: open_source_gplv3
    license_gate: source_compliance_for_images
    runpod_fit: strong
    gpu_class: "RTX 4090/L40S/A100"
    smoke_command: "topaz --help"
    runtime_artifacts: "topaz_toolcheck.json, particle_pick_manifest.json"
    citation_notes: "Record model/checkpoint and training/inference parameters."
    status: planned
    notes: "Open particle picking lane; keep source-compliance metadata with images. PyPI release history lists topaz-em 0.3.20 as the latest release on 2026-05-11."
  ctffind:
    role: ctf_estimation
    image_family: cryo-core
    install_method: source_or_binary_after_terms_review
    license_class: janelia_research_campus_terms_review
    license_gate: exact_version_terms_review
    runpod_fit: strong
    gpu_class: "CPU or GPU depending build"
    smoke_command: "ctffind --help || ctffind4 --help"
    runtime_artifacts: "ctf_estimation_manifest.json"
    citation_notes: "Record CTFFIND version and microscope metadata."
    status: watch
    notes: "Useful CTF lane; confirm CTFFIND major version and Janelia/binary/source redistribution terms before image inclusion."
  cistem:
    role: cryoem_processing_pipeline
    image_family: cryo-core
    install_method: binary_or_source_after_terms_review
    upstream_docs: "https://www.cistem.org/"
    license_class: janelia_research_campus_license
    license_gate: exact_binary_source_terms_review
    runpod_fit: possible
    gpu_class: "CPU/GPU depending workflow"
    smoke_command: "cisTEM --help || cisTEM"
    runtime_artifacts: "cistem_toolcheck.json, cistem_project_manifest.json"
    citation_notes: "Record cisTEM version and cite cisTEM/eLife methods paper."
    status: watch
    notes: "Do not treat Janelia-licensed binaries as generic redistributable open source until exact version terms are reviewed."
  cryodrgn:
    role: heterogeneity_analysis
    image_family: cryo-core
    install_method: pip_or_source
    upstream_repo: "https://github.com/ml-struct-bio/cryodrgn"
    upstream_release_tag: "v4.2.1"
    upstream_release_date: "2026-04-27"
    license_class: open_source_gplv3
    license_gate: source_compliance_for_images
    runpod_fit: strong
    gpu_class: "L40S/A100/H100"
    smoke_command: "cryodrgn --help"
    runtime_artifacts: "latent_embeddings/, heterogeneity_report.json"
    citation_notes: "Record cryoDRGN version, model args, and checkpoints."
    status: planned
    notes: "Continuous heterogeneity lane; image builds require GPLv3 source-compliance and dependency review."
  recovar:
    role: heterogeneity_analysis
    image_family: cryo-core
    install_method: pip_or_source_with_use_context_gate
    upstream_repo: "https://github.com/ma-gilles/recovar"
    pypi_package: "recovar==0.4.5"
    license_class: current_main_pu_rl_v2_academic_noncommercial
    license_gate: academic_noncommercial_or_commercial_license
    runpod_fit: possible
    gpu_class: "L40S/A100/H100"
    smoke_command: "recovar --help"
    runtime_artifacts: "recovar_report.json"
    citation_notes: "Record repo commit and paper citation."
    status: gated
    notes: "Current upstream main is academic/noncommercial; older PyPI 0.4.5 was GPLv3. Pin exact source/package and use context."
  modelangelo:
    role: atomic_model_building
    image_family: model-build
    install_method: pip_or_source
    upstream_repo: "https://github.com/3dem/model-angelo"
    upstream_release_tag: "v1.0.16"
    upstream_release_date: "2026-01-09"
    license_class: open_source_mit
    license_gate: none
    runpod_fit: strong
    gpu_class: "L40S/A100/H100"
    smoke_command: "model_angelo --help"
    runtime_artifacts: "modelangelo_output/, model_build_manifest.json"
    citation_notes: "Record model weights, version, sequence inputs, and map processing."
    status: planned
    notes: "Automatic cryo-EM model building; keep large weights in runtime caches or reviewed image layers with hashes."
  coot:
    role: model_review_building
    image_family: model-build
    install_method: package_or_source
    upstream_repo: "https://github.com/pemsley/coot"
    upstream_release_tag: "1.2"
    upstream_release_date: "2026-04-01"
    license_class: open_source_gpl
    license_gate: source_compliance_for_images
    runpod_fit: possible
    gpu_class: "CPU or GUI"
    smoke_command: "coot --version"
    runtime_artifacts: "coot_session_notes.json"
    citation_notes: "Record Coot version and manual edits."
    status: planned
    notes: "Useful local/GUI model review lane; scripted use should emit edit provenance. Coot development blog reports Coot 1.2 released 2026-04-01."
  cryosparc:
    role: cryoem_reconstruction
    image_family: cryo-core
    install_method: runtime_installer_with_license_id
    upstream_docs: "https://guide.cryosparc.com/"
    upstream_major_release_tag: "v5.0"
    upstream_major_release_date: "2026-01-27"
    license_class: noncommercial_academic_or_commercial_license
    license_gate: required_runtime_license_id
    runpod_fit: possible
    gpu_class: "RTX 4090/L40S/A100/H100"
    smoke_command: "cryosparcm status"
    runtime_artifacts: "cryosparc_project_manifest.json, cryosparc_versions.json, license-gates.json"
    citation_notes: "Record CryoSPARC version, job graph, processing parameters, and export ledger."
    status: gated
    notes: "No installer, license ID, secrets, project DB dump, or proprietary package in git or public images; runtime access only after operator gate. CryoSPARC Guide lists v5.0 as the current major line released 2026-01-27."
  phenix:
    role: model_refinement_validation
    image_family: model-build
    install_method: runtime_installer_or_existing_license
    upstream_release_tag: "2.0"
    upstream_build: "2.0-5936"
    upstream_release_date: "2026-01"
    license_class: academic_or_commercial_license
    license_gate: license_required
    runpod_fit: possible
    gpu_class: "CPU"
    smoke_command: "phenix.version"
    runtime_artifacts: "phenix_validation_summary.json"
    citation_notes: "Record Phenix version and module outputs."
    status: gated
    notes: "Runtime-gated refinement/validation lane; no license files in repo. Phenix mailing-list announcement reports Phenix 2.0 build 2.0-5936 available in January 2026."
  chimerax:
    role: visualization_figures_model_review
    image_family: model-build
    install_method: runtime_installer_or_local_review
    upstream_release_tag: "1.11"
    upstream_release_date: "2025-12-16"
    upstream_docs: "https://www.rbvi.ucsf.edu/chimerax/"
    license_class: no_cost_noncommercial
    license_gate: noncommercial_terms
    runpod_fit: gui_or_scripted
    gpu_class: "CPU/L4/L40S for offscreen rendering"
    smoke_command: "ChimeraX --version"
    runtime_artifacts: "chimerax_session.cxs, chimerax_render_manifest.json, executed_commands.jsonl"
    citation_notes: "Record ChimeraX version, session, command script, and operator use posture."
    status: gated
    notes: "Intentionally duplicated with CryoCore. Do not redistribute binaries or store license acceptance records in git."
  ccpem:
    role: cryoem_model_building_suite
    image_family: model-build
    install_method: runtime_installer_or_package_after_component_review
    upstream_docs: "https://www.ccpem.ac.uk/software/licences/"
    upstream_downloads: "https://www.ccpem.ac.uk/software/downloads/"
    upstream_release_tag: "Doppio 1.5.0"
    upstream_release_date: "2026-02-02"
    upstream_beta_tag: "Doppio 1.6 beta"
    upstream_beta_date: "2026-04-23"
    license_class: suite_license_plus_component_terms
    license_gate: license_and_component_terms_review
    runpod_fit: possible
    gpu_class: "CPU/GPU depending component"
    smoke_command: "ccpem-python --version || ccpem --help"
    runtime_artifacts: "ccpem_toolcheck.json, component_license_manifest.json"
    citation_notes: "Record CCP-EM suite version plus each invoked component and citation."
    status: gated
    notes: "Suite license does not clear all included or separately redistributed packages; public images require component-by-component review. CCP-EM downloads list Doppio 1.5.0 as current stable and 1.6 beta as available."
  kihara_suite:
    role: map_analysis_model_building_quality
    image_family: model-build
    install_method: per_tool_runtime_or_source_after_terms_review
    upstream_docs: "https://kiharalab.org/emsuites/"
    license_class: mixed_gplv3_academic_noncommercial_or_commercial_contact
    license_gate: per_tool_terms_and_use_context_review
    runpod_fit: possible
    gpu_class: "CPU/GPU depending tool"
    smoke_command: "tool-specific --help"
    runtime_artifacts: "kihara_toolcheck.json, per_tool_license_manifest.json"
    citation_notes: "Record exact Kihara tool, version/commit, server/local mode, and method citation."
    status: gated
    notes: "Mixed posture across Emap2sec, Emap2sec+, DAQ, DeepMainMast, CryoREAD, VESPER, and servers; do not package as one cleared suite."
  cryolo:
    role: particle_picking
    image_family: cryo-core
    install_method: runtime_download_after_license_gate
    upstream_docs: "https://cryolo.readthedocs.io/en/stable/"
    license_class: complimentary_science_noncommercial
    license_gate: noncommercial_academic_research_terms
    runpod_fit: possible
    gpu_class: "RTX 4090/L40S/A100"
    smoke_command: "cryolo_gui.py --help || cryolo_predict.py --help"
    runtime_artifacts: "cryolo_toolcheck.json, cryolo_weights_manifest.json, particle_pick_manifest.json"
    citation_notes: "Record crYOLO version, pretrained weight source, and picking parameters."
    status: gated
    notes: "License covers software and pretrained weights; no commercial/operational use, copying, or redistribution in public images without separate permission."
  vmd_namd_mdff:
    role: molecular_dynamics_flexible_fitting
    image_family: model-build
    install_method: runtime_installer_or_existing_local_license
    upstream_docs: "https://www.ks.uiuc.edu/Research/"
    license_class: noncommercial_uiuc_license_or_commercial_license
    license_gate: noncommercial_or_commercial_license_required
    runpod_fit: possible
    gpu_class: "CPU/GPU depending NAMD build"
    smoke_command: "vmd -dispdev text -eofexit < /dev/null || namd2 +version"
    runtime_artifacts: "mdff_run_manifest.json, vmd_namd_license_posture.json"
    citation_notes: "Record VMD, NAMD, MDFF versions and fitting/restraint parameters."
    status: gated
    notes: "MDFF lanes inherit VMD/NAMD license gates; do not redistribute installers, binaries, or signed license records in this repo."
  nvidia_cuda_images:
    role: gpu_runtime_base
    image_family: cryo-core
    install_method: pinned_base_image_or_host_driver_runtime
    upstream_docs: "https://gitlab.com/nvidia/container-images/cuda"
    license_class: nvidia_proprietary_container_eula
    license_gate: current_eula_and_tag_review
    runpod_fit: strong
    gpu_class: "NVIDIA GPU with compatible driver"
    smoke_command: "nvidia-smi && python -c 'import torch; print(torch.cuda.is_available())'"
    runtime_artifacts: "cuda_base_image_manifest.json, nvidia_driver_manifest.json"
    citation_notes: "Record CUDA image tag, digest, driver, CUDA runtime, cuDNN/TensorRT if present."
    status: watch
    notes: "CUDA/base images are proprietary runtime artifacts; pin digest and current EULA posture before public image publication."
  cryoatom_weights:
    role: atomic_model_building_weights
    image_family: model-build
    install_method: runtime_cache_or_reviewed_private_layer
    upstream_docs: "https://github.com/YangLab-SDU/CryoAtom"
    license_class: model_parameters_terms_review
    license_gate: weight_license_and_size_review
    runpod_fit: possible
    gpu_class: "L40S/A100/H100"
    smoke_command: "test -d ${CRYOATOM_WEIGHTS_DIR:-/nonexistent}"
    runtime_artifacts: "cryoatom_weights_manifest.json"
    citation_notes: "Record source URL, checksum, model-parameter version, and CryoAtom citation."
    status: watch
    notes: "Code and model parameters are available, but large weights are runtime artifacts; do not commit or publish them without explicit weight terms review."
  cryofm_weights:
    role: density_foundation_model_weights
    image_family: model-build
    install_method: runtime_cache_or_reviewed_private_layer
    upstream_repo: "https://github.com/ByteDance-Seed/cryofm"
    license_class: apache_2_code_weight_terms_review
    license_gate: weight_license_and_size_review
    runpod_fit: possible
    gpu_class: "L40S/A100/H100"
    smoke_command: "test -d ${CRYOFM_WEIGHTS_DIR:-/nonexistent}"
    runtime_artifacts: "cryofm_weights_manifest.json"
    citation_notes: "Record CryoFM code commit, weight URL/checksum, and model card or release citation."
    status: watch
    notes: "Apache-2.0 code does not remove the need to track large weight redistribution and provenance separately."
  cryo_ief_weights:
    role: particle_image_foundation_model_weights
    image_family: cryo-core
    install_method: runtime_cache_or_reviewed_private_layer
    upstream_repo: "https://github.com/westlake-repl/Cryo-IEF"
    license_class: mit_code_weight_terms_review
    license_gate: weight_license_and_size_review
    runpod_fit: possible
    gpu_class: "L40S/A100/H100"
    smoke_command: "test -d ${CRYO_IEF_WEIGHTS_DIR:-/nonexistent}"
    runtime_artifacts: "cryo_ief_weights_manifest.json"
    citation_notes: "Record Cryo-IEF code commit, model-weight source/checksum, and downstream task citation."
    status: watch
    notes: "MIT code status is separate from heavy model-weight packaging; no weights in git, tracker comments, or public fixtures."
  gemmi:
    role: structure_file_processing
    image_family: model-build
    install_method: pip_or_package
    license_class: open_source_mpl_2
    license_gate: none
    runpod_fit: strong
    gpu_class: "CPU"
    smoke_command: "python -c 'import gemmi; print(gemmi.__version__)'"
    runtime_artifacts: "structure_parse_report.json"
    citation_notes: "Record version for parsing/validation."
    status: planned
    notes: "Core parser/converter for CIF/PDB/map-adjacent metadata."
  molstar:
