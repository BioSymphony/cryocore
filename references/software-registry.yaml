    license_gate: sam2_checkpoint_and_training_data_review
    runpod_fit: possible
    gpu_class: "RTX 4090/L40S/A100"
    smoke_command: "python -c 'print(\"CryoFSL placeholder\")'"
    runtime_artifacts: "cryofsl_run_manifest.json, particle_pick_star_files/, annotation_subset_manifest.json"
    citation_notes: "Record CryoFSL commit, SAM2 checkpoint, annotated micrograph IDs, training split, and output STAR paths."
    status: watch
    notes: "Few-shot SAM2-based particle picker. Good small picking run if annotated micrographs and SAM2 checkpoint terms are recorded."
  parseek:
