    citation_notes: "Record preprint DOI, code URL if released, training data source, and particle-picking benchmark."
    status: watch
    notes: "May 2026 preprint for synthetic-data particle picking. No public code was found in the May 27 scan, so keep as a watch item only."
  structagent:
