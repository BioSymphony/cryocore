    install_method: source_after_third_party_tool_gate_review
    upstream_repo: "https://github.com/bhgtiger/StructAgent"
    upstream_preprint: "https://www.biorxiv.org/content/10.64898/2026.05.18.725842v1"
    license_class: open_source_apache_2_plus_third_party_tool_terms
    license_gate: third_party_tool_license_and_private_data_review
    runpod_fit: not_primary
    gpu_class: "CPU for orchestration; GPU by linked tools"
    smoke_command: "python -c 'print(\"StructAgent reference placeholder\")'"
    runtime_artifacts: "structagent_review_notes.json, orchestration_pattern_manifest.json"
    citation_notes: "Record StructAgent commit, preprint DOI, invoked third-party tools, and whether only protocol ideas were reused."
    status: watch
    notes: "May 2026 public agent system for cryo-EM model building and validation. Track design patterns, but CryoCore workflows should still produce actual maps, models, or validation outputs."
  gemmi:
    role: structure_file_processing
    image_family: model-build
    install_method: pip_or_package
    license_class: open_source_mpl_2
    license_gate: none
    runpod_fit: strong
    gpu_class: "CPU"
    smoke_command: "python -c 'import gemmi; print(gemmi.__version__)'"
    runtime_artifacts: "structure_parse_report.json"
    citation_notes: "Record version for parsing/validation."
    status: planned
    notes: "Core parser/converter for CIF/PDB/map-adjacent metadata."
  molstar:
    role: web_visualization
    image_family: figures
    install_method: npm_or_static_bundle
    license_class: open_source_mit
    license_gate: none
    runpod_fit: possible
    gpu_class: "CPU/web"
    smoke_command: "node --version"
    runtime_artifacts: "molstar_viewer_bundle/"
    citation_notes: "Record viewer build/version."
    status: planned
