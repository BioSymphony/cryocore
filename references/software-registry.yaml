    image_family: cryo-core
    install_method: metadata_only_until_code_release
    upstream_preprint: "https://doi.org/10.64898/2026.05.07.720949"
    license_class: no_code_found_terms_review
    license_gate: code_release_and_dataset_terms_required
    runpod_fit: not_primary
    gpu_class: "GPU likely; not pinned"
